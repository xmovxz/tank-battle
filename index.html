<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T1-T4 层级会议问题管理系统</title>
<style>
/* ========== CSS Reset ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;line-height:1.6;color:#1f2937;background:#f3f4f6;min-height:100vh}

/* ========== Design Tokens ========== */
:root{
  --primary:#1a73e8;--primary-light:#e8f0fe;--primary-dark:#1557b0;
  --success:#0d904f;--success-light:#e6f4ea;
  --warning:#e37400;--warning-light:#fef7e0;
  --danger:#d93025;--danger-light:#fce8e6;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;--gray-700:#374151;--gray-800:#1f2937;--gray-900:#111827;
  --radius-sm:4px;--radius:6px;--radius-lg:8px;--radius-xl:12px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);--shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);--shadow-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);--shadow-xl:0 20px 25px rgba(0,0,0,.1),0 10px 10px rgba(0,0,0,.04);
  --transition:150ms ease;
}

/* ========== Typography ========== */
h1{font-size:1.5rem;font-weight:700}h2{font-size:1.25rem;font-weight:600}h3{font-size:1.1rem;font-weight:600}h4{font-size:1rem;font-weight:600}
a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}

/* ========== Layout ========== */
.app-container{max-width:1280px;margin:0 auto;padding:0 16px}
.app-header{background:#fff;border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
.app-header .app-container{display:flex;align-items:center;justify-content:space-between;height:56px}
.app-logo{display:flex;align-items:center;gap:10px;font-size:1.15rem;font-weight:700;color:var(--gray-800)}
.app-logo .logo-icon{width:32px;height:32px;background:var(--primary);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem}
.app-nav{display:flex;gap:4px}
.app-nav a{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--radius);color:var(--gray-600);font-size:.875rem;font-weight:500;transition:all var(--transition);text-decoration:none}
.app-nav a:hover,.app-nav a.active{background:var(--primary-light);color:var(--primary);text-decoration:none}
.app-nav a .nav-icon{font-size:1.1rem}
.app-main{padding:20px 0 80px}
.app-footer{text-align:center;padding:16px;color:var(--gray-400);font-size:.75rem;border-top:1px solid var(--gray-200);background:#fff}

/* ========== Cards ========== */
.card{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow);border:1px solid var(--gray-200)}
.card-header{padding:14px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:.95rem}
.card-body{padding:20px}
.card+.card{margin-top:16px}

/* ========== Buttons ========== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;font-size:.875rem;font-weight:500;border-radius:var(--radius);border:1px solid transparent;cursor:pointer;transition:all var(--transition);white-space:nowrap;font-family:inherit;line-height:1.5;text-decoration:none}
.btn:hover{text-decoration:none}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark);border-color:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#0b7a42}
.btn-warning{background:var(--warning);color:#fff}
.btn-warning:hover{background:#c55d00}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#b3261e}
.btn-outline{background:#fff;color:var(--gray-700);border-color:var(--gray-300)}
.btn-outline:hover{background:var(--gray-50);border-color:var(--gray-400)}
.btn-ghost{background:transparent;color:var(--gray-600)}
.btn-ghost:hover{background:var(--gray-100)}
.btn-sm{padding:4px 10px;font-size:.8rem}
.btn-lg{padding:10px 20px;font-size:.95rem}
.btn-icon{padding:6px 8px}
.btn:disabled{opacity:.5;cursor:not-allowed;pointer-events:none}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}

/* ========== Badges ========== */
.badge{display:inline-flex;align-items:center;padding:2px 10px;font-size:.75rem;font-weight:600;border-radius:9999px;line-height:1.6}
.badge-open{background:#dbeafe;color:#1e40af}
.badge-closed{background:#d1fae5;color:#065f46}
.badge-t1{background:#e0e7ff;color:#3730a3}
.badge-t1p{background:#dbeafe;color:#1e40af}
.badge-t2{background:#e0f2fe;color:#075985}
.badge-t3{background:#fef3c7;color:#92400e}
.badge-t4{background:#fee2e2;color:#991b1b}
.badge-low{background:#e8f5e9;color:#2e7d32}
.badge-medium{background:#fff3e0;color:#e65100}
.badge-high{background:#fce4ec;color:#c62828}
.badge-critical{background:#fbe9e7;color:#bf360c;font-weight:700}

/* ========== Forms ========== */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:.875rem;font-weight:600;color:var(--gray-700);margin-bottom:6px}
.form-label .required{color:var(--danger);margin-left:2px}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;font-size:.875rem;font-family:inherit;border:1px solid var(--gray-300);border-radius:var(--radius);background:#fff;color:var(--gray-800);transition:border-color var(--transition);outline:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,115,232,.12)}
.form-input.error,.form-select.error,.form-textarea.error{border-color:var(--danger)}
.form-error{font-size:.8rem;color:var(--danger);margin-top:4px;display:none}
.form-error.show{display:block}
.form-textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-hint{font-size:.8rem;color:var(--gray-400);margin-top:4px}

/* ========== Tables ========== */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.875rem}
thead th{background:var(--gray-50);padding:10px 14px;text-align:left;font-weight:600;color:var(--gray-600);border-bottom:2px solid var(--gray-200);white-space:nowrap;cursor:pointer;user-select:none;transition:background var(--transition)}
thead th:hover{background:var(--gray-100)}
thead th .sort-icon{margin-left:4px;font-size:.7rem;color:var(--gray-400)}
thead th.sorted .sort-icon{color:var(--primary)}
tbody td{padding:10px 14px;border-bottom:1px solid var(--gray-100);color:var(--gray-700)}
tbody tr{cursor:pointer;transition:background var(--transition)}
tbody tr:hover{background:var(--primary-light)}
tbody tr.clickable:hover{background:var(--primary-light)}

/* ========== Modals ========== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.modal-overlay.hidden{display:none}
.modal-content{background:#fff;border-radius:var(--radius-xl);box-shadow:var(--shadow-xl);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h3{font-size:1.05rem}
.modal-close{width:32px;height:32px;border:none;background:transparent;font-size:1.25rem;cursor:pointer;border-radius:50%;color:var(--gray-400);display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.modal-close:hover{background:var(--gray-100);color:var(--gray-700)}
.modal-body{padding:20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--gray-100);display:flex;justify-content:flex-end;gap:8px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ========== Timeline ========== */
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:8px;top:4px;bottom:4px;width:2px;background:var(--gray-200)}
.timeline-item{position:relative;margin-bottom:20px}
.timeline-item:last-child{margin-bottom:0}
.timeline-dot{position:absolute;left:-22px;top:2px;width:12px;height:12px;border-radius:50%;border:2px solid var(--gray-300);background:#fff;z-index:1}
.timeline-dot.create{background:var(--primary);border-color:var(--primary)}
.timeline-dot.escalate{background:var(--warning);border-color:var(--warning)}
.timeline-dot.close{background:var(--success);border-color:var(--success)}
.timeline-dot.reopen{background:var(--primary);border-color:var(--primary)}
.timeline-dot.comment{background:var(--gray-300);border-color:var(--gray-300)}
.timeline-time{font-size:.75rem;color:var(--gray-400);margin-bottom:2px}
.timeline-content{background:var(--gray-50);border-radius:var(--radius);padding:10px 14px;border:1px solid var(--gray-100)}
.timeline-content .tl-action{font-weight:600;font-size:.85rem;margin-bottom:2px}
.timeline-content .tl-detail{font-size:.8rem;color:var(--gray-500)}

/* ========== Stat Cards ========== */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow);border:1px solid var(--gray-200);padding:20px;display:flex;align-items:center;gap:16px;transition:box-shadow var(--transition)}
.stat-card:hover{box-shadow:var(--shadow-md)}
.stat-icon{width:48px;height:48px;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.stat-icon.blue{background:#dbeafe;color:#1e40af}
.stat-icon.green{background:#d1fae5;color:#065f46}
.stat-icon.orange{background:#fef3c7;color:#92400e}
.stat-icon.red{background:#fee2e2;color:#991b1b}
.stat-icon.purple{background:#ede9fe;color:#5b21b6}
.stat-value{font-size:1.75rem;font-weight:700;line-height:1.2}
.stat-label{font-size:.8rem;color:var(--gray-500);margin-top:2px}

/* ========== Bar Chart ========== */
.bar-chart .bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.bar-chart .bar-label{width:70px;font-size:.8rem;font-weight:600;text-align:right;color:var(--gray-600);flex-shrink:0}
.bar-chart .bar-track{flex:1;height:24px;background:var(--gray-100);border-radius:12px;overflow:hidden;position:relative}
.bar-chart .bar-fill{height:100%;border-radius:12px;transition:width .5s ease;min-width:2px;display:flex;align-items:center;padding-left:10px;font-size:.75rem;color:#fff;font-weight:600}
.bar-chart .bar-count{width:40px;font-size:.85rem;font-weight:600;color:var(--gray-700);flex-shrink:0}
.bar-fill.t1{background:linear-gradient(90deg,#6366f1,#818cf8)}
.bar-fill.t1p{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.bar-fill.t2{background:linear-gradient(90deg,#0ea5e9,#38bdf8)}
.bar-fill.t3{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.bar-fill.t4{background:linear-gradient(90deg,#ef4444,#f87171)}

/* ========== Filter Bar ========== */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.filter-bar .form-input,.filter-bar .form-select{width:auto;min-width:130px}
.filter-bar .search-input{flex:1;min-width:180px;max-width:320px}

/* ========== Pagination ========== */
.pagination{display:flex;align-items:center;justify-content:center;gap:4px;padding:16px 0}
.pagination .page-btn{width:36px;height:36px;border:1px solid var(--gray-200);background:#fff;border-radius:var(--radius);cursor:pointer;font-size:.85rem;color:var(--gray-600);transition:all var(--transition);display:flex;align-items:center;justify-content:center}
.pagination .page-btn:hover:not(.active):not(:disabled){background:var(--gray-50);border-color:var(--gray-300)}
.pagination .page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.pagination .page-btn:disabled{opacity:.35;cursor:default}
.pagination .page-info{font-size:.8rem;color:var(--gray-500);padding:0 12px}

/* ========== Bottom Nav (Mobile) ========== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gray-200);display:none;z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.bottom-nav .nav-items{display:flex}
.bottom-nav .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;color:var(--gray-400);font-size:.7rem;font-weight:500;cursor:pointer;transition:color var(--transition);border:none;background:none;font-family:inherit}
.bottom-nav .nav-item.active{color:var(--primary)}
.bottom-nav .nav-item .nav-icon{font-size:1.3rem}

/* ========== Empty State ========== */
.empty-state{text-align:center;padding:48px 20px;color:var(--gray-400)}
.empty-state .empty-icon{font-size:3rem;margin-bottom:12px}
.empty-state p{margin-bottom:16px;font-size:.9rem}

/* ========== Toast ========== */
.toast-container{position:fixed;top:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 18px;border-radius:var(--radius);font-size:.875rem;font-weight:500;color:#fff;box-shadow:var(--shadow-lg);animation:slideIn .3s ease;max-width:360px}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}
.toast.info{background:var(--primary)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ========== Info Grid ========== */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-item{}
.info-item .info-label{font-size:.75rem;color:var(--gray-400);margin-bottom:2px}
.info-item .info-value{font-size:.9rem;color:var(--gray-800);font-weight:500}

/* ========== Comment Section ========== */
.comment-list{margin-bottom:16px}
.comment-item{padding:10px 14px;background:var(--gray-50);border-radius:var(--radius);margin-bottom:8px;border-left:3px solid var(--gray-200)}
.comment-item .cmt-header{display:flex;justify-content:space-between;margin-bottom:4px}
.comment-item .cmt-author{font-weight:600;font-size:.85rem}
.comment-item .cmt-time{font-size:.75rem;color:var(--gray-400)}
.comment-item .cmt-text{font-size:.875rem;color:var(--gray-600)}

/* ========== Section Headers ========== */
.section-title{font-size:.95rem;font-weight:600;color:var(--gray-700);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:3px;height:16px;background:var(--primary);border-radius:2px}

/* ========== Confirm Dialog ========== */
.confirm-text{font-size:.9rem;color:var(--gray-600);line-height:1.6}
.confirm-highlight{font-weight:600;color:var(--gray-800)}

/* ========== Utilities ========== */
.text-center{text-align:center}
.text-right{text-align:right}
.text-muted{color:var(--gray-400)}
.text-sm{font-size:.8rem}
.mt-1{margin-top:8px}.mt-2{margin-top:12px}.mt-3{margin-top:16px}.mt-4{margin-top:24px}
.mb-1{margin-bottom:8px}.mb-2{margin-bottom:12px}.mb-3{margin-bottom:16px}.mb-4{margin-bottom:24px}
.flex{display:flex}.flex-between{display:flex;justify-content:space-between;align-items:center}.flex-wrap{flex-wrap:wrap}.gap-1{gap:6px}.gap-2{gap:10px}.gap-3{gap:16px}
.hidden{display:none!important}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.clickable{cursor:pointer}
.no-select{user-select:none}

/* ========== Issue Detail Header ========== */
.detail-header{margin-bottom:20px}
.detail-header .back-btn{display:inline-flex;align-items:center;gap:4px;color:var(--gray-500);font-size:.85rem;margin-bottom:10px;cursor:pointer;background:none;border:none;font-family:inherit;padding:0}
.detail-header .back-btn:hover{color:var(--primary)}
.detail-header .detail-id{font-size:.8rem;color:var(--gray-400);margin-bottom:4px}
.detail-header .detail-title{font-size:1.3rem;font-weight:700;color:var(--gray-800)}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}

/* ========== Responsive ========== */
@media(max-width:1024px){
  .form-row{grid-template-columns:1fr}
  .info-grid{grid-template-columns:1fr}
  .filter-bar .search-input{max-width:none;flex:1 1 100%}
}
@media(max-width:768px){
  .app-nav{display:none}
  .bottom-nav{display:block}
  .app-main{padding-bottom:100px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .stat-card{padding:14px;gap:10px}
  .stat-icon{width:36px;height:36px;font-size:1.1rem}
  .stat-value{font-size:1.35rem}
  .modal-content{max-width:100%;margin:0 8px;max-height:95vh}
  .filter-bar .form-input,.filter-bar .form-select{min-width:100px}
  thead th{padding:8px 10px;font-size:.8rem}
  tbody td{padding:8px 10px;font-size:.8rem}
  .bar-chart .bar-label{width:50px;font-size:.7rem}
  .detail-actions .btn{font-size:.8rem;padding:6px 12px}
}
@media(max-width:480px){
  .stat-grid{grid-template-columns:1fr 1fr;gap:8px}
  .stat-card{padding:10px;gap:8px}
  .stat-icon{width:30px;height:30px;font-size:.9rem;border-radius:var(--radius-sm)}
  .stat-value{font-size:1.2rem}
  .btn-group{flex-direction:column;width:100%}
  .btn-group .btn{width:100%}
}

/* ========== Print ========== */
@media print{
  .app-header,.bottom-nav,.app-footer,.detail-actions,.btn,.modal-overlay,.toast-container,.filter-bar,.pagination{display:none!important}
  .app-main{padding:0}
  .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid}
  body{background:#fff;font-size:12px}
}

/* ========== View Transitions ========== */
.view{animation:fadeIn .2s ease}
</style>
</head>
<body>

<!-- ==================== HEADER ==================== -->
<header class="app-header">
  <div class="app-container">
    <div class="app-logo">
      <div class="logo-icon">📋</div>
      <span>T1-T4 层级会议问题管理</span>
    </div>
    <nav class="app-nav" id="topNav">
      <a href="#dashboard" data-nav="dashboard" class="active"><span class="nav-icon">📊</span> 仪表盘</a>
      <a href="#list" data-nav="list"><span class="nav-icon">📋</span> 问题列表</a>
      <a href="#create" data-nav="create"><span class="nav-icon">➕</span> 录入问题</a>
    </nav>
  </div>
</header>

<!-- ==================== MAIN CONTENT ==================== -->
<main class="app-main" id="appMain">
  <div class="app-container" id="viewContainer"></div>
</main>

<!-- ==================== FOOTER ==================== -->
<footer class="app-footer">
  T1-T4 层级会议问题管理系统 · 数据存储于浏览器本地 · 支持导出备份
</footer>

<!-- ==================== BOTTOM NAV (Mobile) ==================== -->
<nav class="bottom-nav" id="bottomNav">
  <div class="nav-items">
    <button class="nav-item active" data-nav="dashboard"><span class="nav-icon">📊</span> 仪表盘</button>
    <button class="nav-item" data-nav="list"><span class="nav-icon">📋</span> 问题列表</button>
    <button class="nav-item" data-nav="create"><span class="nav-icon">➕</span> 录入</button>
  </div>
</nav>

<!-- ==================== MODALS ==================== -->
<div class="modal-overlay hidden" id="escalateModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>⬆️ 问题升级</h3>
      <button class="modal-close" data-close="escalateModal">&times;</button>
    </div>
    <div class="modal-body">
      <div class="confirm-text mb-3" id="escalateInfo"></div>
      <div class="form-group">
        <label class="form-label">升级说明 <span class="required">*</span></label>
        <textarea class="form-textarea" id="escalateComment" placeholder="请说明升级原因及需要上级协调处理的事项..."></textarea>
        <div class="form-error" id="escalateError">请输入升级说明</div>
      </div>
      <div class="form-group">
        <label class="form-label">操作人 <span class="required">*</span></label>
        <input class="form-input" id="escalateOperator" placeholder="请输入操作人姓名">
        <div class="form-error" id="escalateOpError">请输入操作人</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" data-close="escalateModal">取消</button>
      <button class="btn btn-warning" id="confirmEscalate">确认升级</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="closeModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>✅ 问题闭环</h3>
      <button class="modal-close" data-close="closeModal">&times;</button>
    </div>
    <div class="modal-body">
      <div class="confirm-text mb-3" id="closeInfo"></div>

// ==================== UTILITY FUNCTIONS ====================
function formatDateTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function formatDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function nowISO() { return new Date().toISOString(); }

function generateIssueId() {
  const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
  const all = Store.getState().issues;
  const todayIssues = all.filter(i => i.id && i.id.startsWith(`ISS-${today}`));
  const seq = String(todayIssues.length + 1).padStart(3,'0');
  return `ISS-${today}-${seq}`;
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function debounce(fn, ms) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), ms);
  };
}

// ==================== STORE ====================
const Store = {
  _state: {
    issues: [],
    view: 'dashboard',
    detailId: null,
    filters: { search:'', category:'', severity:'', level:'', status:'', dateFrom:'', dateTo:'' },
    sort: { field:'createdAt', dir:'desc' },
    page: 1,
    perPage: 15,
  },
  _listeners: [],

  getState() { return this._state; },

  dispatch(action, payload) {
    const s = this._state;
    switch (action) {
      case 'ISSUES_LOADED':
        s.issues = payload;
        break;
      case 'ISSUE_CREATE':
        s.issues.unshift(payload);
        break;
      case 'ISSUE_UPDATE':
        s.issues = s.issues.map(i => i.id === payload.id ? payload : i);
        break;
      case 'ISSUE_DELETE':
        s.issues = s.issues.filter(i => i.id !== payload);
        break;
      case 'IMPORT_DATA':
        s.issues = [...payload, ...s.issues];
        break;
      case 'CLEAR_ALL':
        s.issues = [];
        break;
      case 'NAVIGATE':
        s.view = payload.view;
        s.detailId = payload.detailId || null;
        s.page = 1;
        break;
      case 'FILTER_SET':
        Object.assign(s.filters, payload);
        s.page = 1;
        break;
      case 'FILTER_RESET':
        s.filters = { search:'', category:'', severity:'', level:'', status:'', dateFrom:'', dateTo:'' };
        s.page = 1;
        break;
      case 'SORT_SET':
        if (s.sort.field === payload) { s.sort.dir = s.sort.dir === 'asc' ? 'desc' : 'asc'; }
        else { s.sort.field = payload; s.sort.dir = 'asc'; }
        break;
      case 'PAGE_SET':
        s.page = payload;
        break;
    }
    if (['ISSUE_CREATE','ISSUE_UPDATE','ISSUE_DELETE','IMPORT_DATA','CLEAR_ALL'].includes(action)) {
      this.save();
    }
    this._listeners.forEach(fn => fn(action));
  },

  subscribe(fn) {
    this._listeners.push(fn);
    return () => { this._listeners = this._listeners.filter(f => f !== fn); };
  },

  load() {
    try {
      const raw = localStorage.getItem('tank-battle-issues');
      let issues = raw ? JSON.parse(raw) : [];
      if (!Array.isArray(issues)) issues = [];
      if (issues.length === 0) {
        issues = seedDemoData();
        localStorage.setItem('tank-battle-issues', JSON.stringify(issues));
      }
      this.dispatch('ISSUES_LOADED', issues);
    } catch (e) {
      console.error('Failed to load data:', e);
      this.dispatch('ISSUES_LOADED', seedDemoData());
    }
  },

  save() {
    try {
      localStorage.setItem('tank-battle-issues', JSON.stringify(this._state.issues));
    } catch (e) {
      showToast('存储空间不足，请导出数据后清理旧数据', 'error');
    }
  }
};

// ==================== FILTER & SORT ENGINE ====================
function getFilteredIssues() {
  const s = Store.getState();
  let issues = [...s.issues];
  const f = s.filters;

  if (f.search) {
    const q = f.search.toLowerCase();
    issues = issues.filter(i =>
      i.title.toLowerCase().includes(q) ||
      i.description.toLowerCase().includes(q) ||
      i.id.toLowerCase().includes(q) ||
      (i.reporter && i.reporter.toLowerCase().includes(q))
    );
  }
  if (f.category) issues = issues.filter(i => i.category === f.category);
  if (f.severity) issues = issues.filter(i => i.severity === f.severity);
  if (f.level) issues = issues.filter(i => i.currentLevel === f.level);
  if (f.status) issues = issues.filter(i => i.status === f.status);
  if (f.dateFrom) issues = issues.filter(i => i.createdAt >= f.dateFrom);
  if (f.dateTo) issues = issues.filter(i => i.createdAt <= f.dateTo + 'T23:59:59');

  // Sort
  issues.sort((a,b) => {
    let va = a[s.sort.field], vb = b[s.sort.field];
    if (va == null) va = '';
    if (vb == null) vb = '';
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return s.sort.dir === 'asc' ? -1 : 1;
    if (va > vb) return s.sort.dir === 'asc' ? 1 : -1;
    return 0;
  });

  return issues;
}

function getPageSlice(issues) {
  const s = Store.getState();
  const start = (s.page - 1) * s.perPage;
  return { slice: issues.slice(start, start + s.perPage), total: issues.length, totalPages: Math.ceil(issues.length / s.perPage) };
}

// ==================== TOAST ====================
function showToast(msg, type) {
  type = type || 'info';
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity .3s'; }, 2500);
  setTimeout(() => toast.remove(), 2800);
}

// ==================== ROUTER ====================
function navigate(view, detailId) {
  Store.dispatch('NAVIGATE', { view, detailId });
  render();
}

function handleHash() {
  const hash = location.hash.replace('#','') || 'dashboard';
  if (hash.startsWith('detail/')) {
    navigate('detail', hash.split('/')[1]);
  } else if (hash.startsWith('edit/')) {
    navigate('edit', hash.split('/')[1]);
  } else if (['dashboard','list','create'].includes(hash)) {
    navigate(hash);
  } else {
    navigate('dashboard');
  }
}

  document.querySelectorAll('#topNav a, #bottomNav .nav-item').forEach(el => {

  });
}

// ==================== MAIN RENDER ====================
function render() {
  const s = Store.getState();
  const container = document.getElementById('viewContainer');
  updateNavActive(s.view);

  switch (s.view) {
    case 'dashboard': renderDashboard(container); break;
    case 'list': renderIssueList(container); break;
    case 'create': renderCreateForm(container); break;
    case 'detail': renderIssueDetail(container, s.detailId); break;
    case 'edit': renderEditForm(container, s.detailId); break;
    default: renderDashboard(container);
  }
}

function renderPageNumbers(current, total) {
  let pages = [];
  const start = Math.max(1, current - 2);
  const end = Math.min(total, current + 2);
  for (let i = start; i <= end; i++) {
    pages.push(`<button class="page-btn ${i === current ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`);
  }
  return pages.join('');
}

function goToPage(page) {
  const { totalPages } = getPageSlice(getFilteredIssues());
  if (page < 1 || page > totalPages) return;
  Store.dispatch('PAGE_SET', page);
  render();
}

function handleFilterChange(key, value) {
  Store.dispatch('FILTER_SET', { [key]: value });
  render();
}

function resetFilters() {
  Store.dispatch('FILTER_RESET');
  render();
}

function handleSort(field) {
  Store.dispatch('SORT_SET', field);
  render();
}

  if (!category) { document.getElementById('errCategory').classList.add('show'); valid = false; }
  if (!severity) { document.getElementById('errSeverity').classList.add('show'); valid = false; }
  if (!source) { document.getElementById('errSource').classList.add('show'); valid = false; }
  if (reporter.length < 2) { document.getElementById('errReporter').classList.add('show'); valid = false; }
  if (description.length < 5) { document.getElementById('errDescription').classList.add('show'); valid = false; }
  if (!valid) return;

  if (isEdit) {
    const id = document.getElementById('editId').value;
    const existing = Store.getState().issues.find(i => i.id === id);
    if (!existing) return;

    const updated = {
      ...existing,
      title, category, severity, source, reporter, description,
      history: [...existing.history, {
        timestamp: nowISO(),
        action: 'edit',
        fromLevel: existing.currentLevel,
        toLevel: existing.currentLevel,
        operator: reporter,
        comment: '编辑问题信息'
      }]
    };
    Store.dispatch('ISSUE_UPDATE', updated);
    showToast('问题已更新', 'success');
    navigate('detail', id);
  } else {
    const now = nowISO();
    const issue = {
      id: generateIssueId(),
      createdAt: now,
      title,
      description,
      category,
      severity,
      source,
      reporter,
      currentLevel: originLevel,
      originLevel,
      status: 'open',
      closeLevel: null,
      closedAt: null,
      closedBy: null,
      closeReason: null,
      history: [{
        timestamp: now,
        action: 'create',
        fromLevel: null,
        toLevel: originLevel,
        operator: reporter,
        comment: `问题创建于 ${LEVEL_LABELS[originLevel]}`
      }],
      comments: []
    };
    Store.dispatch('ISSUE_CREATE', issue);
    showToast('问题录入成功', 'success');
    navigate('detail', issue.id);
  }
}

function renderEditForm(container, id) {
  const issue = Store.getState().issues.find(i => i.id === id);
  if (!issue) { navigate('list'); return; }
  renderCreateForm(container, issue);
}

// ==================== ISSUE DETAIL VIEW ====================
function renderIssueDetail(container, id) {
  const issue = Store.getState().issues.find(i => i.id === id);
  if (!issue) { container.innerHTML = '<div class="empty-state"><div class="empty-icon">❓</div><p>问题不存在</p><button class="btn btn-primary btn-sm" onclick="navigate(\'list\')">返回列表</button></div>'; return; }

  const canEscalate = issue.status === 'open' && NEXT_LEVEL[issue.currentLevel] !== null;
  const canClose = issue.status === 'open';
  const canReopen = issue.status === 'closed';
  const nextLevel = NEXT_LEVEL[issue.currentLevel];

  let html = `
    <div class="view">
      <!-- Detail Header -->
      <div class="detail-header">
        <button class="back-btn" onclick="navigate('list')">← 返回列表</button>
        <div class="detail-id">${issue.id}</div>
        <div class="detail-title">${escapeHtml(issue.title)}</div>
      </div>

      <!-- Action Buttons -->
      <div class="detail-actions">
        <button class="btn btn-outline btn-sm" onclick="navigate('edit','${issue.id}')">✏️ 编辑</button>
        ${canEscalate ? `<button class="btn btn-warning btn-sm" onclick="openEscalateModal('${issue.id}')">⬆️ 升级至 ${LEVEL_LABELS[nextLevel]}</button>` : ''}
        ${canClose ? `<button class="btn btn-success btn-sm" onclick="openCloseModal('${issue.id}')">✅ 本级闭环</button>` : ''}
        ${canReopen ? `<button class="btn btn-outline btn-sm" onclick="openReopenConfirm('${issue.id}')">🔓 重新打开</button>` : ''}
        ${!canEscalate && issue.status === 'open' && !nextLevel ? '<span class="badge badge-t4" style="font-size:.8rem">已达最高层级 T4</span>' : ''}
      </div>

      <!-- Info Card -->
      <div class="card mb-3">
        <div class="card-header">📋 问题信息</div>
        <div class="card-body">
          <div class="info-grid">
            <div class="info-item"><div class="info-label">当前状态</div><div class="info-value"><span class="badge ${issue.status==='closed'?'badge-closed':'badge-open'}">${issue.status==='closed'?'已闭环':'未闭环'}</span></div></div>
            <div class="info-item"><div class="info-label">当前层级</div><div class="info-value"><span class="badge badge-${issue.currentLevel.toLowerCase()}">${LEVEL_LABELS[issue.currentLevel]}</span></div></div>
            <div class="info-item"><div class="info-label">初始层级</div><div class="info-value">${LEVEL_LABELS[issue.originLevel]}</div></div>
            <div class="info-item"><div class="info-label">问题类别</div><div class="info-value"><span class="badge badge-t1">${CATEGORY_LABELS[issue.category]}</span></div></div>
            <div class="info-item"><div class="info-label">严重程度</div><div class="info-value"><span class="badge badge-${issue.severity}">${SEVERITY_LABELS[issue.severity]}</span></div></div>
            <div class="info-item"><div class="info-label">问题来源</div><div class="info-value">${SOURCE_LABELS[issue.source]}</div></div>
            <div class="info-item"><div class="info-label">报告人</div><div class="info-value">${escapeHtml(issue.reporter)}</div></div>
            <div class="info-item"><div class="info-label">创建时间</div><div class="info-value">${formatDateTime(issue.createdAt)}</div></div>
            ${issue.status === 'closed' ? `
            <div class="info-item"><div class="info-label">闭环时间</div><div class="info-value" style="color:var(--success)">${formatDateTime(issue.closedAt)}</div></div>
            <div class="info-item"><div class="info-label">闭环层级</div><div class="info-value"><span class="badge badge-${(issue.closeLevel||'').toLowerCase()}">${LEVEL_LABELS[issue.closeLevel] || '-'}</span></div></div>
            <div class="info-item"><div class="info-label">闭环操作人</div><div class="info-value">${escapeHtml(issue.closedBy||'-')}</div></div>
            <div class="info-item"><div class="info-label">闭环原因</div><div class="info-value" style="font-size:.85rem">${escapeHtml(issue.closeReason||'-')}</div></div>
            ` : ''}
          </div>
        </div>
      </div>

      <!-- Description -->
      <div class="card mb-3">
        <div class="card-header">📝 问题描述</div>
        <div class="card-body">
          <p style="white-space:pre-wrap;font-size:.9rem;line-height:1.7">${escapeHtml(issue.description)}</p>
        </div>
      </div>

      <!-- Comments -->
      <div class="card mb-3">
        <div class="card-header">💬 评论 (${(issue.comments||[]).length})</div>
        <div class="card-body">
          <div class="comment-list">
            ${(issue.comments||[]).length === 0 ? '<div class="empty-state"><p style="font-size:.85rem">暂无评论</p></div>' : ''}
            ${(issue.comments||[]).map(c => `
              <div class="comment-item">
                <div class="cmt-header">
                  <span class="cmt-author">👤 ${escapeHtml(c.author)}</span>
                  <span class="cmt-time">${formatDateTime(c.timestamp)}</span>
                </div>
                <div class="cmt-text">${escapeHtml(c.text)}</div>
              </div>
            `).join('')}
          </div>
          <form onsubmit="addComment(event, '${issue.id}')" style="display:flex;gap:8px">
            <input class="form-input" id="commentAuthor" placeholder="姓名" style="width:100px;flex-shrink:0" required>
            <input class="form-input" id="commentText" placeholder="添加评论..." style="flex:1" required>
            <button type="submit" class="btn btn-primary btn-sm">发送</button>
          </form>
        </div>
      </div>

      <!-- Lifecycle Timeline -->
      <div class="card">
        <div class="card-header">🕐 全生命周期追溯</div>
        <div class="card-body">
          ${(issue.history||[]).length === 0 ? '<div class="empty-state"><p style="font-size:.85rem">暂无记录</p></div>' : `
          <div class="timeline">
            ${[...(issue.history||[])].reverse().map(h => `
              <div class="timeline-item">
                <div class="timeline-dot ${h.action}"></div>
                <div class="timeline-time">${formatDateTime(h.timestamp)}</div>
                <div class="timeline-content">
                  <div class="tl-action">${HISTORY_ACTION_LABELS[h.action]} ${h.action === 'escalate' ? `: ${h.fromLevel} → ${h.toLevel}` : ''}</div>
                  ${h.operator ? `<div class="tl-detail">操作人: ${escapeHtml(h.operator)}</div>` : ''}
                  ${h.comment ? `<div class="tl-detail">${escapeHtml(h.comment)}</div>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
          `}
        </div>
      </div>
    </div>`;

  container.innerHTML = html;
}

// ==================== ACTIONS ====================
let _escalateIssueId = null;
let _closeIssueId = null;
let _confirmCallback = null;

function openEscalateModal(id) {
  _escalateIssueId = id;
  const issue = Store.getState().issues.find(i => i.id === id);
  if (!issue) return;
  const next = NEXT_LEVEL[issue.currentLevel];
  document.getElementById('escalateInfo').innerHTML = `
    将问题 <span class="confirm-highlight">${escapeHtml(issue.title)}</span>
    从 <span class="confirm-highlight">${LEVEL_LABELS[issue.currentLevel]}</span>
    升级至 <span class="confirm-highlight">${LEVEL_LABELS[next]}</span>
  `;
  document.getElementById('escalateComment').value = '';
  document.getElementById('escalateOperator').value = '';
  document.getElementById('escalateError').classList.remove('show');
  document.getElementById('escalateOpError').classList.remove('show');
  openModal('escalateModal');
}

function openCloseModal(id) {
  _closeIssueId = id;
  const issue = Store.getState().issues.find(i => i.id === id);
  if (!issue) return;
  document.getElementById('closeInfo').innerHTML = `
    将在 <span class="confirm-highlight">${LEVEL_LABELS[issue.currentLevel]}</span> 层级
    闭环问题 <span class="confirm-highlight">${escapeHtml(issue.title)}</span>
  `;
  document.getElementById('closeReason').value = '';
  document.getElementById('closeOperator').value = '';
  document.getElementById('closeError').classList.remove('show');
  document.getElementById('closeOpError').classList.remove('show');
  openModal('closeModal');
}

function confirmEscalate() {
  const comment = document.getElementById('escalateComment').value.trim();
  const operator = document.getElementById('escalateOperator').value.trim();
  let valid = true;
  document.getElementById('escalateError').classList.remove('show');
  document.getElementById('escalateOpError').classList.remove('show');
  if (!comment) { document.getElementById('escalateError').classList.add('show'); valid = false; }
  if (!operator) { document.getElementById('escalateOpError').classList.add('show'); valid = false; }
  if (!valid) return;

  const issue = Store.getState().issues.find(i => i.id === _escalateIssueId);
  if (!issue) return;
  const next = NEXT_LEVEL[issue.currentLevel];
  if (!next) return;

  const updated = {
    ...issue,
    currentLevel: next,
    history: [...issue.history, {
      timestamp: nowISO(),
      action: 'escalate',
      fromLevel: issue.currentLevel,
      toLevel: next,
      operator,
      comment
    }]
  };
  Store.dispatch('ISSUE_UPDATE', updated);
  closeModal('escalateModal');
  showToast(`问题已升级至 ${LEVEL_LABELS[next]}`, 'success');
  navigate('detail', _escalateIssueId);
}

function confirmClose() {
  const reason = document.getElementById('closeReason').value.trim();
  const operator = document.getElementById('closeOperator').value.trim();
  let valid = true;
  document.getElementById('closeError').classList.remove('show');
  document.getElementById('closeOpError').classList.remove('show');
  if (!reason) { document.getElementById('closeError').classList.add('show'); valid = false; }
  if (!operator) { document.getElementById('closeOpError').classList.add('show'); valid = false; }
  if (!valid) return;

  const issue = Store.getState().issues.find(i => i.id === _closeIssueId);
  if (!issue) return;
  const now = nowISO();

  const updated = {
    ...issue,
    status: 'closed',
    closeLevel: issue.currentLevel,
    closedAt: now,
    closedBy: operator,
    closeReason: reason,
    history: [...issue.history, {
      timestamp: now,
      action: 'close',
      fromLevel: issue.currentLevel,
      toLevel: null,
      operator,
      comment: `问题在 ${LEVEL_LABELS[issue.currentLevel]} 层级闭环，原因：${reason}`
    }]
  };
  Store.dispatch('ISSUE_UPDATE', updated);
  closeModal('closeModal');
  showToast('问题已闭环', 'success');
  navigate('detail', _closeIssueId);
}

function openReopenConfirm(id) {
  _confirmCallback = () => {
    const issue = Store.getState().issues.find(i => i.id === id);
    if (!issue) return;
    const revertLevel = issue.closeLevel || issue.originLevel;
    const updated = {
      ...issue,
      status: 'open',
      currentLevel: revertLevel,
      closeLevel: null,
      closedAt: null,
      closedBy: null,
      closeReason: null,
      history: [...issue.history, {
        timestamp: nowISO(),
        action: 'reopen',
        fromLevel: null,
        toLevel: revertLevel,
        operator: '系统操作',
        comment: `问题重新打开，恢复至 ${LEVEL_LABELS[revertLevel]} 层级`
      }]
    };
    Store.dispatch('ISSUE_UPDATE', updated);
    showToast('问题已重新打开', 'info');
    navigate('detail', id);
    closeModal('confirmModal');
  };
  const issue = Store.getState().issues.find(i => i.id === id);
  document.getElementById('confirmTitle').textContent = '确认重新打开';
  document.getElementById('confirmText').innerHTML = `
    确认重新打开问题 <span class="confirm-highlight">${escapeHtml(issue?.title||'')}</span>？<br>
    问题将恢复至 <span class="confirm-highlight">${LEVEL_LABELS[issue?.closeLevel||issue?.originLevel||'T1']}</span> 层级，状态变为未闭环。
  `;
  openModal('confirmModal');
}

function addComment(e, issueId) {
  e.preventDefault();
  const author = document.getElementById('commentAuthor').value.trim();
  const text = document.getElementById('commentText').value.trim();
  if (!author || !text) return;

  const issue = Store.getState().issues.find(i => i.id === issueId);
  if (!issue) return;
  const now = nowISO();
  const comment = { id: 'cmt-' + Date.now(), timestamp: now, author, text };
  const updated = {
    ...issue,
    comments: [...(issue.comments||[]), comment],
    history: [...issue.history, {
      timestamp: now,
      action: 'comment',
      fromLevel: null,
      toLevel: null,
      operator: author,
      comment: text
    }]
  };
  Store.dispatch('ISSUE_UPDATE', updated);
  showToast('评论已添加', 'success');
  render();
}

// ==================== EXPORT / IMPORT ====================
function exportData() {
  const data = JSON.stringify(Store.getState().issues, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tank-battle-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('数据导出成功', 'success');
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('数据格式错误：应为数组');
      // Basic validation
      for (const item of data) {
        if (!item.id || !item.title || !item.status) throw new Error('数据格式错误：缺少必要字段');
      }
      Store.dispatch('IMPORT_DATA', data);
      showToast(`成功导入 ${data.length} 条记录`, 'success');
      render();
    } catch (err) {
      showToast('导入失败: ' + err.message, 'error');
    }
    document.getElementById('importStatus').textContent = '';
  };
  reader.readAsText(file);
}

function clearAllData() {
  _confirmCallback = () => {
    Store.dispatch('CLEAR_ALL');
    closeModal('confirmModal');
    showToast('所有数据已清除', 'info');
    navigate('dashboard');
  };
  document.getElementById('confirmTitle').textContent = '⚠️ 确认清除';
  document.getElementById('confirmText').innerHTML = '确认清除<span class="confirm-highlight">所有问题数据</span>？<br>此操作不可恢复，建议先导出备份。';
  openModal('confirmModal');
}

// ==================== EVENT DELEGATION ====================
document.addEventListener('DOMContentLoaded', () => {
  // Modal close buttons
  document.querySelectorAll('[data-close]').forEach(btn => {
    btn.addEventListener('click', function() {
      closeModal(this.dataset.close);
    });
  });

  // Close modals on overlay click
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', function(e) {
      if (e.target === this) closeModal(this.id);
    });
  });

  // Escalate confirm
  document.getElementById('confirmEscalate').addEventListener('click', confirmEscalate);

  // Close confirm
  document.getElementById('confirmClose').addEventListener('click', confirmClose);

  // Confirm modal action
  document.getElementById('confirmAction').addEventListener('click', () => {
    if (_confirmCallback) { _confirmCallback(); _confirmCallback = null; }
  });

  // Export/Import
  document.getElementById('exportBtn').addEventListener('click', exportData);
  document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', function() {
    if (this.files[0]) {
      document.getElementById('importStatus').textContent = '导入中...';
      importData(this.files[0]);
      this.value = '';
    }
  });
  document.getElementById('clearAllBtn').addEventListener('click', clearAllData);

  // Bottom nav
  document.querySelectorAll('#bottomNav .nav-item').forEach(item => {
    item.addEventListener('click', function() {
      navigate(this.dataset.nav);
    });
  });

  // Keyboard shortcut: Escape closes modals
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeAllModals();
  });

  // Initialize
  Store.load();
  Store.subscribe(() => {
    // Re-render is called explicitly by action handlers
  });
  handleHash();
});
</script>
